<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>论文查询器 - Dify Knowledge API</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>📚 论文查询器</h2>
      <p class="subtitle">基于 Dify 知识库 API</p>
    </div>

    <!-- API 配置区 -->
    <div class="config-section">
      <h3>⚙️ API 配置</h3>
      <div class="form-group">
        <label for="apiBase">API 基础 URL</label>
        <input type="text" id="apiBase" value="https://api.dify.ai/v1" placeholder="https://api.dify.ai/v1">
      </div>
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="输入你的知识库 API Key">
        <button class="btn-icon" id="toggleKey" title="显示/隐藏">👁️</button>
      </div>
      <button class="btn btn-primary" id="btnConnect">🔗 连接知识库</button>
      <div id="connectStatus" class="status-msg"></div>
    </div>

    <!-- 知识库列表 -->
    <div class="dataset-section" id="datasetSection" style="display:none;">
      <h3>📖 知识库列表</h3>
      <div class="dataset-list" id="datasetList"></div>
      <div class="dataset-info" id="datasetInfo"></div>
    </div>

    <!-- 检索设置 -->
    <div class="retrieval-section" id="retrievalSection" style="display:none;">
      <h3>🔍 检索设置</h3>
      <div class="form-group">
        <label for="topK">返回结果数</label>
        <input type="range" id="topK" min="1" max="20" value="5">
        <span class="range-value" id="topKValue">5</span>
      </div>
      <div class="form-group">
        <label for="scoreThreshold">分数阈值</label>
        <input type="range" id="scoreThreshold" min="0" max="100" value="0">
        <span class="range-value" id="scoreThresholdValue">0</span>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="scoreThresholdEnabled">
        <label for="scoreThresholdEnabled">启用分数过滤</label>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="main-content">
    <!-- 顶部搜索栏 -->
    <header class="search-header">
      <button class="btn btn-icon-only" id="btnToggleSidebar" title="切换侧边栏">☰</button>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入论文关键词、标题、作者或研究领域进行搜索..." disabled>
        <button class="btn btn-search" id="btnSearch" disabled>🔍 搜索</button>
      </div>
      <button class="btn btn-outline" id="btnClear" disabled>清空</button>
    </header>

    <!-- 搜索建议标签 -->
    <div class="search-suggestions" id="searchSuggestions" style="display:none;">
      <span class="suggestion-label">热门搜索：</span>
    </div>

    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay" style="display:none;">
      <div class="spinner"></div>
      <p>正在检索论文...</p>
    </div>

    <!-- 结果统计 -->
    <div class="results-header" id="resultsHeader" style="display:none;">
      <div class="results-count" id="resultsCount"></div>
      <div class="results-sort">
        <span>排序：</span>
        <select id="sortBy">
          <option value="score">相关性</option>
          <option value="position">文档位置</option>
        </select>
      </div>
    </div>

    <!-- 搜索结果列表 -->
    <div class="results-list" id="resultsList"></div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📄</div>
      <h3>开始检索论文</h3>
      <p>请先在左侧配置 API 并选择知识库，然后输入关键词搜索论文</p>
      <div class="empty-steps">
        <div class="step"><span class="step-num">1</span>配置 API Key</div>
        <div class="step"><span class="step-num">2</span>选择知识库</div>
        <div class="step"><span class="step-num">3</span>输入关键词搜索</div>
      </div>
    </div>

    <!-- 分页 -->
    <div class="pagination" id="pagination" style="display:none;"></div>

    <!-- 论文详情弹窗 -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
      <div class="modal" id="modal">
        <div class="modal-header">
          <h2 id="modalTitle">论文详情</h2>
          <button class="btn-close" id="btnCloseModal">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
