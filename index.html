<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dify Workflow — 工作流执行器</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ====== 顶部导航 ====== -->
  <nav class="navbar">
    <div class="nav-inner">
      <a class="logo" href="#">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span>Dify Workflow</span>
      </a>
      <div class="nav-actions">
        <!-- 状态 -->
        <div class="connection-dot" id="connDot">
          <span class="dot"></span>
          <span class="conn-text" id="connLabel">初始化中...</span>
        </div>
        <!-- 应用名 -->
        <span class="app-name" id="appNameDisplay">—</span>
        <!-- 日志按钮 -->
        <button class="btn-ghost" id="btnLogs">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          运行日志
        </button>
      </div>
    </div>
  </nav>

  <!-- ====== 主布局 ====== -->
  <div class="layout">
    <!-- 左侧：执行区 -->
    <main class="main-panel">
      <div class="panel-card">
        <!-- 应用信息头 -->
        <div class="app-header" id="appHeader">
          <div class="skeleton" style="width:240px;height:24px;"></div>
          <div class="skeleton" style="width:180px;height:16px;margin-top:8px;"></div>
        </div>

        <!-- 动态表单区 -->
        <div class="form-section" id="formSection">
          <div class="skeleton" style="width:100px;height:14px;"></div>
          <div class="skeleton" style="width:100%;height:42px;margin-top:8px;"></div>
          <div class="skeleton" style="width:80px;height:14px;margin-top:16px;"></div>
          <div class="skeleton" style="width:100%;height:42px;margin-top:8px;"></div>
        </div>

        <!-- 文件上传区 -->
        <div class="upload-area" id="uploadArea" style="display:none;">
          <label class="upload-label">📎 文件上传</label>
          <div class="upload-drop" id="uploadDrop">
            <input type="file" id="fileInput" multiple style="display:none;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>拖拽文件到此处，或 <span class="upload-link">点击选择</span></p>
            <p class="upload-hint" id="uploadHint">支持图片、文档，单文件 ≤ 15MB</p>
          </div>
          <div class="file-list" id="fileList"></div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-row">
          <button class="btn-run" id="btnRun" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
            执行工作流
          </button>
          <button class="btn-stop" id="btnStop" style="display:none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            停止
          </button>
          <span class="run-mode">
            模式：
            <select id="responseMode">
              <option value="streaming">流式 (Streaming)</option>
              <option value="blocking">阻塞 (Blocking)</option>
            </select>
          </span>
        </div>
      </div>

      <!-- 输出区 -->
      <div class="panel-card output-panel" id="outputPanel" style="display:none;">
        <div class="output-head">
          <h3>执行结果</h3>
          <div class="output-meta">
            <span class="status-badge" id="statusBadge">运行中</span>
            <span id="elapsedTime"></span>
            <span id="tokenCount"></span>
            <span id="stepCount"></span>
          </div>
        </div>
        <div class="output-body" id="outputBody">
          <div class="output-placeholder" id="outputPlaceholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            <p>执行结果将在此处显示</p>
          </div>
          <!-- 流式文本累积区 -->
          <div class="stream-text" id="streamText"></div>
          <!-- 结构化输出 -->
          <div class="output-json" id="outputJson"></div>
          <!-- 节点流程图简图 -->
          <div class="node-timeline" id="nodeTimeline"></div>
        </div>
      </div>
    </main>

    <!-- 右侧：日志侧栏 -->
    <aside class="log-panel" id="logPanel">
      <div class="log-head">
        <h3>运行日志</h3>
        <div class="log-filters">
          <select id="logStatus">
            <option value="">全部状态</option>
            <option value="succeeded">成功</option>
            <option value="failed">失败</option>
            <option value="stopped">已停止</option>
          </select>
          <button class="btn-refresh" id="btnRefreshLogs">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>
      <div class="log-list" id="logList">
        <div class="log-empty">加载中...</div>
      </div>
      <div class="log-pager" id="logPager"></div>
    </aside>
  </div>

  <!-- ====== 日志详情模态框 ====== -->
  <div class="modal-glass" id="modalOverlay">
    <div class="modal-card" id="modalCard">
      <div class="modal-top">
        <h2 id="modalTitle">运行详情</h2>
        <button class="btn-modal-close" id="btnCloseModal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-scroll" id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
